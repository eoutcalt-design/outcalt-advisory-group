<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Post | Outcalt Advisory Group</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body>

<header class="site-header">
  <a class="brand-lockup" href="index.html" aria-label="Outcalt Advisory Group home">
    <img src="assets/mark-dark.png" alt="Outcalt Advisory Group mark" class="brand-mark">
    <div>
      <div class="brand-name">OUTCALT</div>
      <div class="brand-sub">ADVISORY GROUP</div>
    </div>
  </a>
  <nav class="nav-links" id="navLinks" aria-label="Main navigation">
    <a href="strategic-deal-architecture.html">Strategic Deal Architecture</a>
    <a href="business-exit-positioning.html">Business Exit Positioning</a>
    <a href="blog.html">Blog</a>
    <a class="nav-cta" href="index.html#contact">Request a Strategic Review</a>
  </nav>
  <div class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
    <span></span>
    <span></span>
    <span></span>
  </div>
</header>

<main>
<article id="postContainer" class="blog-post-container">
  <div style="text-align: center; padding: 60px 20px; color: #666;">
    <p>Loading post...</p>
  </div>
</article>
</main>

<footer class="site-footer">
  <div class="footer-container">
    <div class="footer-content">
      <p>&copy; 2026 Outcalt Advisory Group. All rights reserved.</p>
      <a href="admin.html" class="admin-link">Admin</a>
    </div>
  </div>
</footer>

<script>
  async function loadBlogPost() {
    try {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('slug');
      
      if (!slug) {
        document.getElementById('postContainer').innerHTML = '<div style="text-align: center; padding: 60px 20px; color: #666;"><p>Post not found.</p></div>';
        return;
      }
      
      const response = await fetch(`/api/blog/posts/${slug}`);
      if (!response.ok) {
        throw new Error('Post not found');
      }
      
      const post = await response.json();
      
      // Update page title and meta description
      document.title = `${post.title} | Outcalt Advisory Group`;
      const metaDesc = document.querySelector('meta[name="description"]');
      if (metaDesc) {
        metaDesc.setAttribute('content', post.meta_description || post.excerpt);
      }
      
      // Convert Quill Delta to HTML
      function deltaToHtml(delta) {
        if (typeof delta === 'string') {
          try {
            delta = JSON.parse(delta);
          } catch (e) {
            return delta; // If not JSON, return as is
          }
        }
        
        if (!delta || !delta.ops) {
          return '';
        }
        
        let html = '';
        let currentBlock = '';
        let blockType = 'p';
        let listType = null;
        let listItems = [];
        
        delta.ops.forEach((op, index) => {
          if (op.insert) {
            const text = op.insert;
            let formatted = text;
            
            if (op.attributes) {
              if (op.attributes.bold) formatted = `<strong>${formatted}</strong>`;
              if (op.attributes.italic) formatted = `<em>${formatted}</em>`;
              if (op.attributes.code) formatted = `<code>${formatted}</code>`;
              if (op.attributes.link) formatted = `<a href="${op.attributes.link}">${formatted}</a>`;
            }
            
            currentBlock += formatted;
          }
          
          // Handle block-level attributes
          if (op.attributes) {
            if (op.attributes.header) {
              if (currentBlock) {
                html += `<h${op.attributes.header}>${currentBlock}</h${op.attributes.header}>`;
                currentBlock = '';
              }
            } else if (op.attributes.list) {
              if (currentBlock) {
                listItems.push(currentBlock);
                currentBlock = '';
              }
              if (op.attributes.list !== listType) {
                if (listItems.length > 0) {
                  const tag = listType === 'bullet' ? 'ul' : 'ol';
                  html += `<${tag}>${listItems.map(item => `<li>${item}</li>`).join('')}</${tag}>`;
                  listItems = [];
                }
                listType = op.attributes.list;
              }
            }
          }
          
          // Handle line breaks
          if (text.includes('\n')) {
            if (listType) {
              listItems.push(currentBlock);
              currentBlock = '';
            } else if (currentBlock) {
              html += `<p>${currentBlock}</p>`;
              currentBlock = '';
            }
          }
        });
        
        // Close any remaining list
        if (listItems.length > 0) {
          const tag = listType === 'bullet' ? 'ul' : 'ol';
          html += `<${tag}>${listItems.map(item => `<li>${item}</li>`).join('')}</${tag}>`;
        }
        
        // Add remaining content
        if (currentBlock) {
          html += `<p>${currentBlock}</p>`;
        }
        
        return html;
      }
      
      const bodyHtml = deltaToHtml(post.body);
      
      const container = document.getElementById('postContainer');
      container.innerHTML = `
        <div class="blog-post-wrapper">
          <div class="blog-post-header">
            <div class="blog-post-meta">
              <span class="blog-post-category">${post.category || 'General'}</span>
              <span class="blog-post-date">${new Date(post.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}</span>
            </div>
            <h1>${post.title}</h1>
            ${post.featured_image ? `<img src="${post.featured_image}" alt="${post.featured_image_alt || post.title}" class="blog-post-featured-image">` : ''}
          </div>
          <div class="blog-post-content">
            ${bodyHtml}
          </div>
          <div class="blog-post-footer">
            <a href="blog.html" class="back-to-blog">← Back to Blog</a>
          </div>
        </div>
      `;
    } catch (error) {
      console.error('Error loading blog post:', error);
      document.getElementById('postContainer').innerHTML = '<div style="text-align: center; padding: 60px 20px; color: #666;"><p>Error loading post. <a href="blog.html">Back to blog</a></p></div>';
    }
  }
  
  loadBlogPost();
</script>

<style>
  .blog-post-container {
    max-width: 800px;
    margin: 60px auto;
    padding: 0 20px;
  }
  
  .blog-post-wrapper {
    background: white;
    border-radius: 8px;
    overflow: hidden;
  }
  
  .blog-post-header {
    margin-bottom: 40px;
  }
  
  .blog-post-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    font-size: 13px;
  }
  
  .blog-post-category {
    background: #f0f0f0;
    color: #333;
    padding: 4px 10px;
    border-radius: 4px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  
  .blog-post-date {
    color: #999;
    font-size: 12px;
  }
  
  .blog-post-header h1 {
    font-size: 36px;
    line-height: 1.3;
    margin: 0 0 24px 0;
    color: #1a1a1a;
  }
  
  .blog-post-featured-image {
    width: 100%;
    max-height: 400px;
    object-fit: cover;
    border-radius: 8px;
    margin-bottom: 24px;
    display: block;
  }
  
  .blog-post-content {
    font-size: 16px;
    line-height: 1.8;
    color: #333;
    margin-bottom: 40px;
  }
  
  .blog-post-content h2 {
    font-size: 24px;
    margin: 32px 0 16px 0;
    color: #1a1a1a;
  }
  
  .blog-post-content h3 {
    font-size: 20px;
    margin: 24px 0 12px 0;
    color: #1a1a1a;
  }
  
  .blog-post-content p {
    margin: 0 0 16px 0;
  }
  
  .blog-post-content ul,
  .blog-post-content ol {
    margin: 0 0 16px 20px;
    padding-left: 20px;
  }
  
  .blog-post-content li {
    margin-bottom: 8px;
  }
  
  .blog-post-content strong {
    color: #d4af37;
    font-weight: 600;
  }
  
  .blog-post-content blockquote {
    border-left: 4px solid #d4af37;
    padding-left: 20px;
    margin: 24px 0;
    font-style: italic;
    color: #666;
  }
  
  .blog-post-content code {
    background: #f5f5f5;
    padding: 2px 6px;
    border-radius: 3px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
  }
  
  .blog-post-content pre {
    background: #f5f5f5;
    padding: 16px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 16px 0;
  }
  
  .blog-post-content pre code {
    background: none;
    padding: 0;
  }
  
  .blog-post-footer {
    padding-top: 24px;
    border-top: 1px solid #eee;
  }
  
  .back-to-blog {
    color: #d4af37;
    text-decoration: none;
    font-weight: 600;
    transition: color 0.3s ease;
  }
  
  .back-to-blog:hover {
    color: #b8931f;
  }
  
  @media (max-width: 768px) {
    .blog-post-container {
      margin: 40px auto;
    }
    
    .blog-post-header h1 {
      font-size: 24px;
    }
    
    .blog-post-content {
      font-size: 15px;
    }
  }
</style>

</main>

<script src="nav.js"></script>

</body>
</html>
