services:
  - type: web
    name: outcalt-advisory-group
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true

databases:
  - name: outcalt-db
    databaseName: outcalt
    user: outcalt_user
    plan: free
